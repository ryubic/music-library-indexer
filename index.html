<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>My Music Collection</title>
    <style>
      :root {
        --bg-body: #121212;
        --bg-card: #1e1e1e;
        --bg-sidebar: #181818;
        --text-main: #e0e0e0;
        --text-muted: #a0a0a0;
        --accent: #bb86fc;
        --accent-hover: #9965f4;
        --border: #333;
        --badge-bg: #333;
        --badge-text: #fff;
        --incomplete: #cf6679;
        --lossless: #03dac6;
        --lossy: #ffb74d;
        --font-family:
          -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica,
          Arial, sans-serif;
        --scrollbar-size: 6px;
      }

      [data-theme="light"] {
        --bg-body: #f4f4f5;
        --bg-card: #ffffff;
        --bg-sidebar: #ffffff;
        --text-main: #18181b;
        --text-muted: #52525b;
        --accent: #6366f1;
        --accent-hover: #4f46e5;
        --border: #e4e4e7;
        --badge-bg: #f4f4f5;
        --badge-text: #18181b;
        --incomplete: #ef4444;
        --lossless: #10b981;
        --lossy: #f59e0b;
      }

      * {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }

      body {
        font-family: var(--font-family);
        background-color: var(--bg-body);
        color: var(--text-main);
        transition:
          background-color 0.3s,
          color 0.3s;
        display: flex;
        flex-direction: column;
        height: 100vh;
        overflow: hidden;
      }

      /* Header */
      header {
        padding: 1rem 2rem;
        border-bottom: 1px solid var(--border);
        display: flex;
        justify-content: space-between;
        align-items: center;
        background-color: var(--bg-sidebar);
        z-index: 10;
        gap: 1.5rem;
        flex-wrap: wrap;
      }

      .header-left {
        display: flex;
        align-items: center;
        gap: 1rem;
      }

      h1 {
        font-size: 1.5rem;
        font-weight: 700;
        letter-spacing: -0.5px;
        display: flex;
        align-items: center;
        gap: 0.5rem;
      }

      .info-btn {
        background: none;
        border: 1px solid var(--border);
        color: var(--text-muted);
        width: 24px;
        height: 24px;
        border-radius: 50%;
        display: flex;
        align-items: center;
        justify-content: center;
        margin-top: 5px;
        font-size: 0.8rem;
        font-weight: bold;
        cursor: pointer;
        transition: all 0.2s;
      }
      .info-btn:hover {
        color: var(--accent);
        border-color: var(--accent);
      }

      .header-controls {
        display: flex;
        gap: 1rem;
        align-items: center;
        flex-wrap: wrap;
      }

      .search-container {
        position: relative;
      }

      .search-input {
        background: var(--bg-card);
        border: 1px solid var(--border);
        color: var(--text-main);
        padding: 0.5rem 0.75rem;
        border-radius: 6px;
        font-size: 0.9rem;
        transition: all 0.2s;
        outline: none;
        width: 180px;
      }
      .search-input:focus {
        border-color: var(--accent);
        width: 220px;
      }
      .search-input::placeholder {
        color: var(--text-muted);
      }

      /* Sort Controls - Redesigned */
      .sort-wrapper {
        display: flex;
        align-items: center;
        gap: 0.5rem;
        background: var(--bg-card);
        padding: 0.35rem 0.5rem;
        border-radius: 8px;
        border: 1px solid var(--border);
      }

      .sort-label {
        font-size: 0.8rem;
        color: var(--text-muted);
        font-weight: 500;
        text-transform: uppercase;
        letter-spacing: 0.5px;
      }

      .sort-select {
        background: transparent;
        border: none;
        color: var(--text-main);
        padding: 0.35rem 0.5rem;
        font-size: 0.85rem;
        cursor: pointer;
        outline: none;
        transition: all 0.2s;
        min-width: 100px;
        font-weight: 500;
      }
      .sort-select:hover {
        color: var(--accent);
      }
      .sort-select:focus {
        color: var(--accent);
      }
      .sort-select option {
        background: var(--bg-card);
        color: var(--text-main);
      }

      .sort-divider {
        width: 1px;
        height: 20px;
        background: var(--border);
      }

      .sort-dir-btn {
        background: transparent;
        border: none;
        color: var(--text-muted);
        padding: 0.35rem 0.5rem;
        border-radius: 6px;
        cursor: pointer;
        font-size: 0.9rem;
        transition: all 0.2s;
        display: flex;
        align-items: center;
        gap: 0.35rem;
      }
      .sort-dir-btn:hover {
        background: var(--bg-hover);
        color: var(--text-main);
      }
      .sort-dir-btn.active {
        color: var(--accent);
        background: rgba(187, 134, 252, 0.1);
      }

      .theme-toggle {
        background: none;
        border: 1px solid var(--border);
        color: var(--text-main);
        padding: 0.5rem 1rem;
        border-radius: 6px;
        cursor: pointer;
        font-size: 0.9rem;
        transition: all 0.2s;
      }
      .theme-toggle:hover {
        background-color: var(--border);
      }

      /* Layout */
      .container {
        display: flex;
        flex: 1;
        overflow: hidden;
      }

      /* Sidebar */
      aside {
        width: 280px;
        background-color: var(--bg-sidebar);
        border-right: 1px solid var(--border);
        padding: 1.5rem;
        overflow-y: auto;
        flex-shrink: 0;
        display: flex;
        flex-direction: column;
      }

      .sidebar-header {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 0.75rem;
        margin-bottom: 1.5rem;
        align-items: center;
      }

      .clear-filters-btn {
        background-color: var(--incomplete);
        color: #fff;
        border: none;
        padding: 0.5rem;
        border-radius: 6px;
        cursor: pointer;
        font-weight: 600;
        font-size: 0.85rem;
        transition: opacity 0.2s;
        width: 100%;
        text-align: center;
      }
      .clear-filters-btn:hover {
        opacity: 0.9;
      }

      .result-count {
        font-size: 0.85rem;
        color: var(--text-muted);
        text-align: right;
        white-space: nowrap;
        overflow: hidden;
        text-overflow: ellipsis;
      }

      .filter-group {
        margin-bottom: 2rem;
        padding: 1em;
         border: 1px solid var(--border);
        border-radius: 12px;

      }
      .filter-group h3 {
        font-size: 0.85rem;
        text-transform: uppercase;
        letter-spacing: 1px;
        color: var(--text-muted);
        margin-bottom: 1rem;
      }

      .checkbox-list {
        display: flex;
        flex-direction: column;
        gap: 0.5rem;
        max-height: 200px;
        overflow-y: auto;
      }

      .checkbox-item {
        display: flex;
        align-items: center;
        font-size: 0.9rem;
        cursor: pointer;
        color: var(--text-muted);
      }
      .checkbox-item:hover {
        color: var(--text-main);
      }
      .checkbox-item input {
        margin-right: 10px;
        accent-color: var(--accent);
      }

      /* Main Content */
      main {
        flex: 1;
        padding: 2rem;
        overflow-y: auto;
        background-color: var(--bg-body);
      }

      .grid {
        display: grid;
        grid-template-columns: repeat(auto-fill, minmax(450px, 1fr));
        gap: 2rem;
      }

      /* Album Card */
      .album-card {
        background-color: var(--bg-card);
        border: 1px solid var(--border);
        border-radius: 12px;
        overflow: hidden;
        display: flex;
        flex-direction: column;
        transition: transform 0.2s;
        cursor: pointer;
      }

      .album-card:hover {
        border-color: var(--accent);
      }
      .album-card.expanded {
        border-color: var(--accent);
      }

      .album-header {
        padding: 1.5rem;
        border-bottom: 1px solid var(--border);
        cursor: pointer;
      }
      .album-header:hover {
        background-color: rgba(255, 255, 255, 0.02);
      }

      .album-title-row {
        display: flex;
        justify-content: space-between;
        align-items: flex-start;
        margin-bottom: 0.5rem;
      }

      .album-title {
        font-size: 1.25rem;
        font-weight: 700;
      }
      .album-artist {
        font-size: 1rem;
        color: var(--text-muted);
        margin-bottom: 1rem;
      }

      .badges {
        display: flex;
        flex-wrap: wrap;
        gap: 0.5rem;
        margin-bottom: 1rem;
      }

      .badge {
        font-size: 0.75rem;
        padding: 0.25rem 0.6rem;
        border-radius: 4px;
        font-weight: 600;
        text-transform: uppercase;
      }

      .badge-genre {
        background-color: var(--badge-bg);
        color: var(--badge-text);
      }
      .badge-year {
        background-color: var(--badge-bg);
        color: var(--badge-text);
      }
      .badge-incomplete {
        background-color: var(--incomplete);
        color: #fff;
      }
      .badge-lossless {
        background-color: var(--lossless);
        color: #000;
      }
      .badge-lossy {
        background-color: var(--lossy);
        color: #000;
      }

      .meta-details {
        font-size: 0.8rem;
        color: var(--text-muted);
        line-height: 1.4;
      }
      .meta-details span {
        display: block;
        margin-top: 2px;
      }

      /* Track List */
      .track-list {
        list-style: none;
      }
      .track-list.tracks-collapsed {
        display: none;
      }

      .tracks-close-btn {
        display: none;
        background: none;
        border: 1px solid var(--border);
        color: var(--text-main);
        padding: 0.25rem 0.75rem;
        border-radius: 4px;
        cursor: pointer;
        font-size: 0.8rem;
        transition: all 0.2s;
        margin: 0.75rem 1.5rem 1rem;
        align-self: flex-start;
      }
      .tracks-close-btn:hover {
        background-color: var(--border);
      }
      .album-card.expanded .tracks-close-btn {
        display: block;
      }

      .track-item {
        display: grid;
        grid-template-columns: 40px 1fr 100px 70px 90px 60px;
        padding: 0.75rem 1.5rem;
        border-bottom: 1px solid var(--border);
        font-size: 0.9rem;
        align-items: center;
      }
      .track-item:last-child {
        border-bottom: none;
      }
      .track-item:hover {
        background-color: rgba(255, 255, 255, 0.03);
      }

      .track-num {
        color: var(--text-muted);
        font-variant-numeric: tabular-nums;
      }
      .track-title {
        font-weight: 500;
        color: var(--text-main);
      }
      .track-artist {
        color: var(--text-muted);
        font-size: 0.85rem;
        text-align: right;
      }
      .track-codec {
        font-size: 0.75rem;
        color: var(--text-muted);
        text-align: right;
      }
      .track-codec .codec-tag {
        background: var(--badge-bg);
        padding: 1px 4px;
        border-radius: 3px;
        color: var(--text-main);
      }
      .track-tech {
        font-size: 0.75rem;
        color: var(--text-muted);
        text-align: right;
      }
      .track-duration {
        font-size: 0.75rem;
        color: var(--text-muted);
        text-align: right;
        font-variant-numeric: tabular-nums;
      }

      /* Modal */
      .modal-overlay {
        position: fixed;
        top: 0;
        left: 0;
        right: 0;
        bottom: 0;
        background: rgba(0, 0, 0, 0.6);
        backdrop-filter: blur(2px);
        z-index: 100;
        display: flex;
        align-items: center;
        justify-content: center;
        opacity: 0;
        pointer-events: none;
        transition: opacity 0.2s;
      }
      .modal-overlay.active {
        opacity: 1;
        pointer-events: all;
      }

      .modal-content {
        background: var(--bg-card);
        border: 1px solid var(--border);
        padding: 2rem;
        border-radius: 12px;
        width: 90%;
        max-width: 500px;
        box-shadow: 0 10px 25px rgba(0, 0, 0, 0.5);
        transform: translateY(10px);
        transition: transform 0.2s;
      }
      .modal-overlay.active .modal-content {
        transform: translateY(0);
      }

      .modal-header {
        display: flex;
        justify-content: space-between;
        align-items: center;
        margin-bottom: 1.5rem;
      }
      .modal-title {
        font-size: 1.25rem;
        font-weight: 700;
      }
      .modal-close {
        background: none;
        border: none;
        color: var(--text-muted);
        font-size: 1.5rem;
        cursor: pointer;
      }
      .modal-close:hover {
        color: var(--text-main);
      }

      .stats-grid {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 1rem;
      }
      .stat-item {
        background: var(--bg-sidebar);
        padding: 1rem;
        border-radius: 8px;
        border: 1px solid var(--border);
      }
      .stat-label {
        font-size: 0.8rem;
        color: var(--text-muted);
        margin-bottom: 0.25rem;
      }
      .stat-value {
        font-size: 1.25rem;
        font-weight: 700;
        color: var(--text-main);
      }

      /* Error State */
      #error-msg {
        color: var(--incomplete);
        padding: 2rem;
        text-align: center;
        display: none;
      }

      /* Scrollbar */
      ::-webkit-scrollbar {
        width: var(--scrollbar-size);
        height: var(--scrollbar-size);
      }
      ::-webkit-scrollbar-track {
        background: transparent;
      }
      ::-webkit-scrollbar-thumb {
        background: var(--border);
        border-radius: 4px;
      }
      ::-webkit-scrollbar-thumb:hover {
        background: var(--text-muted);
      }

      @media (max-width: 768px) {
        .container {
          flex-direction: column;
          overflow: auto;
        }
        aside {
          width: 100%;
          height: auto;
          border-right: none;
          border-bottom: 1px solid var(--border);
        }
        .grid {
          grid-template-columns: 1fr;
        }
        .header-controls {
          flex-wrap: wrap;
        }
        .search-input {
          width: 100%;
        }
        .search-input:focus {
          width: 100%;
        }
        .track-item {
          grid-template-columns: 30px 1fr;
          grid-template-rows: auto auto auto;
          gap: 5px;
        }
        .track-artist,
        .track-codec,
        .track-tech,
        .track-duration {
          grid-column: 2;
          text-align: left;
        }
        .sort-controls {
          flex-direction: column;
          align-items: flex-start;
          width: 100%;
        }
        .sort-select {
          width: 100%;
        }
      }
    </style>
  </head>
  <body>
    <header>
      <div class="header-left">
        <h1>
          Music Library
          <button class="info-btn" id="infoBtn" title="Library Stats">i</button>
        </h1>
      </div>
      <div class="header-controls">
        <div class="search-container">
          <input
            type="text"
            id="searchInput"
            class="search-input"
            placeholder="Search (/)..."
          />
        </div>

        <!-- Updated: Sort controls as dropdowns -->
        <div class="sort-controls">
          <select id="sortField" class="sort-select" title="Sort by">
            <option value="albumName" selected>Name</option>
            <option value="albumArtist">Artist</option>
            <option value="year">Year</option>
            <option value="format">Format</option>
            <option value="codec">Codec</option>
          </select>
          <select id="sortDir" class="sort-select" title="Sort direction">
            <option value="asc" selected>Ascending</option>
            <option value="desc">Descending</option>
          </select>
        </div>

        <button class="theme-toggle" id="themeBtn">Light Mode</button>
      </div>
    </header>

    <div class="container">
      <aside>
        <div class="sidebar-header">
          <button class="clear-filters-btn" id="clearFiltersBtn">
            Clear Filters
          </button>
          <div class="result-count" id="resultCount">0 albums</div>
        </div>

        <div class="filter-group">
          <h3>Album Artist</h3>
          <div class="checkbox-list" id="filter-artist"></div>
        </div>
        <div class="filter-group">
          <h3>Genre</h3>
          <div class="checkbox-list" id="filter-genre"></div>
        </div>
        <div class="filter-group">
          <h3>Year</h3>
          <div class="checkbox-list" id="filter-year"></div>
        </div>
        <div class="filter-group">
          <h3>Format</h3>
          <div class="checkbox-list">
            <label class="checkbox-item">
              <input type="checkbox" value="lossless" class="filter-format" />
              Lossless
            </label>
            <label class="checkbox-item">
              <input type="checkbox" value="lossy" class="filter-format" />
              Lossy
            </label>
          </div>
        </div>
        <!-- NEW: Status filter (Completed/Incomplete) -->
        <div class="filter-group">
          <h3>Status</h3>
          <div class="checkbox-list">
            <label class="checkbox-item">
              <input type="checkbox" value="completed" class="filter-status" />
              Completed
            </label>
            <label class="checkbox-item">
              <input type="checkbox" value="incomplete" class="filter-status" />
              Incomplete
            </label>
          </div>
        </div>
      </aside>

      <main>
        <div id="error-msg"></div>
        <div class="grid" id="album-grid">
          <!-- Albums injected here -->
        </div>
      </main>
    </div>

    <!-- Info Modal -->
    <div class="modal-overlay" id="infoModal">
      <div class="modal-content">
        <div class="modal-header">
          <div class="modal-title">Library Summary</div>
          <button class="modal-close" id="modalClose">&times;</button>
        </div>
        <div class="stats-grid" id="statsGrid">
          <!-- Stats injected here -->
        </div>
      </div>
    </div>

    <script>
      // State
      let libraryData = [];
      const state = {
        artists: new Set(),
        genres: new Set(),
        years: new Set(),
        filters: {
          artists: new Set(),
          genres: new Set(),
          years: new Set(),
          formats: new Set(),
          status: new Set(), // NEW: Added status filter
        },
        sort: {
          field: "albumName",
          direction: "asc",
        },
        searchQuery: "",
      };

      // DOM Elements
      const gridEl = document.getElementById("album-grid");
      const errorEl = document.getElementById("error-msg");
      const themeBtn = document.getElementById("themeBtn");
      const searchInput = document.getElementById("searchInput");
      const clearFiltersBtn = document.getElementById("clearFiltersBtn");
      const resultCountEl = document.getElementById("resultCount");
      const infoBtn = document.getElementById("infoBtn");
      const infoModal = document.getElementById("infoModal");
      const modalClose = document.getElementById("modalClose");
      const statsGrid = document.getElementById("statsGrid");

      // Filter Containers
      const artistFilterEl = document.getElementById("filter-artist");
      const genreFilterEl = document.getElementById("filter-genre");
      const yearFilterEl = document.getElementById("filter-year");
      const sortFieldSelect = document.getElementById("sortField");
      const sortDirSelect = document.getElementById("sortDir");

      // --- Theme Management ---
      function loadTheme() {
        const saved = localStorage.getItem("musicLibTheme");
        if (saved === "light") {
          document.body.setAttribute("data-theme", "light");
          themeBtn.textContent = "Dark Mode";
        } else {
          document.body.removeAttribute("data-theme");
          themeBtn.textContent = "Light Mode";
        }
      }

      function saveTheme(isLight) {
        localStorage.setItem("musicLibTheme", isLight ? "light" : "dark");
      }

      // --- Sort Management ---
      function loadSort() {
        const saved = localStorage.getItem("musicLibSort");
        if (saved) {
          const { field, direction } = JSON.parse(saved);
          state.sort.field = field;
          state.sort.direction = direction;

          // Update Select Elements
          if (sortFieldSelect) sortFieldSelect.value = field;
          if (sortDirSelect) sortDirSelect.value = direction;
        }
      }

      function saveSort() {
        const data = {
          field: state.sort.field,
          direction: state.sort.direction,
        };
        localStorage.setItem("musicLibSort", JSON.stringify(data));
      }

      // --- Filter Management ---
      function loadFilters() {
        const saved = localStorage.getItem("musicLibFilters");
        if (saved) {
          const parsed = JSON.parse(saved);
          if (parsed.artists)
            parsed.artists.forEach((i) => state.filters.artists.add(i));
          if (parsed.genres)
            parsed.genres.forEach((i) => state.filters.genres.add(i));
          if (parsed.years)
            parsed.years.forEach((i) => state.filters.years.add(i));
          if (parsed.formats)
            parsed.formats.forEach((i) => state.filters.formats.add(i));
          if (parsed.status)
            parsed.status.forEach((i) => state.filters.status.add(i)); // NEW
        }
      }

      function saveFilters() {
        const data = {
          artists: Array.from(state.filters.artists),
          genres: Array.from(state.filters.genres),
          years: Array.from(state.filters.years),
          formats: Array.from(state.filters.formats),
          status: Array.from(state.filters.status), // NEW
        };
        localStorage.setItem("musicLibFilters", JSON.stringify(data));
      }

      function clearAllFilters() {
        state.filters.artists.clear();
        state.filters.genres.clear();
        state.filters.years.clear();
        state.filters.formats.clear();
        state.filters.status.clear(); // NEW
        state.searchQuery = "";

        searchInput.value = "";
        saveFilters();
        renderFilters();
        renderAlbums();
      }

      function getSortValue(album, field) {
        switch (field) {
          case "albumName":
            return (album.album || "").toLowerCase();
          case "albumArtist":
            return (album.albumartist || "").toLowerCase();
          case "year":
            return album.year || 0;
          case "format":
            return album.lossless === true ? 1 : 0;
          case "codec":
            if (album.tracks && album.tracks[0] && album.tracks[0].codec) {
              return album.tracks[0].codec.toLowerCase();
            }
            return "zzz";
          default:
            return "";
        }
      }

      function sortAlbums(albums) {
        const { field, direction } = state.sort;
        const multiplier = direction === "asc" ? 1 : -1;

        return [...albums].sort((a, b) => {
          const valA = getSortValue(a, field);
          const valB = getSortValue(b, field);

          if (typeof valA === "string" && typeof valB === "string") {
            return valA.localeCompare(valB) * multiplier;
          }
          if (typeof valA === "number" && typeof valB === "number") {
            return (valA - valB) * multiplier;
          }
          return (String(valA) > String(valB) ? 1 : -1) * multiplier;
        });
      }

      // --- Stats Calculation ---
      function calculateStats() {
        const totalAlbums = libraryData.length;
        const totalTracks = libraryData.reduce(
          (acc, album) => acc + (album.trackTotal || 0),
          0,
        );
        const uniqueArtists = new Set(libraryData.map((a) => a.artistKey)).size;

        const losslessCount = libraryData.filter(
          (a) => a.lossless === true,
        ).length;
        const lossyCount = libraryData.filter(
          (a) => a.lossless === false,
        ).length;
        const incompleteCount = libraryData.filter((a) => a.incomplete).length;

        return {
          totalAlbums,
          totalTracks,
          uniqueArtists,
          losslessCount,
          lossyCount,
          incompleteCount,
        };
      }

      function renderStats() {
        const stats = calculateStats();
        // REMOVED "Completed" stat item as requested
        statsGrid.innerHTML = `
            <div class="stat-item">
                <div class="stat-label">Total Albums</div>
                <div class="stat-value">${stats.totalAlbums}</div>
            </div>
            <div class="stat-item">
                <div class="stat-label">Incomplete</div>
                <div class="stat-value" style="color: var(--incomplete)">${stats.incompleteCount}</div>
            </div>
            <div class="stat-item">
                <div class="stat-label">Total Tracks</div>
                <div class="stat-value">${stats.totalTracks}</div>
            </div>
            <div class="stat-item">
                <div class="stat-label">Unique Artists</div>
                <div class="stat-value">${stats.uniqueArtists}</div>
            </div>
            <div class="stat-item">
                <div class="stat-label">Lossless Albums</div>
                <div class="stat-value" style="color: var(--lossless)">${stats.losslessCount}</div>
            </div>
            <div class="stat-item">
                <div class="stat-label">Lossy Albums</div>
                <div class="stat-value" style="color: var(--lossy)">${stats.lossyCount}</div>
            </div>
        `;
      }

      // --- Initialization ---

      async function init() {
        loadTheme();
        loadSort();
        loadFilters();
        try {
          const response = await fetch("library.json");
          if (!response.ok) throw new Error("Failed to load library.json");
          const rawData = await response.json();
          processData(rawData);
          renderStats(); // Pre-calculate stats
          renderFilters();
          renderAlbums();
        } catch (err) {
          console.error(err);
          errorEl.style.display = "block";
          errorEl.innerHTML = `
                <h2>Could not load library data.</h2>
                <p>${err.message}</p>
                <p style="margin-top:10px; font-size:0.9rem; color:var(--text-muted)">
                    Note: Browsers block fetching local JSON files when opening HTML directly (file://).<br>
                    Please run a local server (e.g., <code>python -m http.server</code>) or use the Live Server extension in VS Code.
                </p>
            `;
        }
      }

      // --- Data Processing ---

      function processData(data) {
        for (const [artistKey, albumsObj] of Object.entries(data)) {
          for (const [albumKey, albumData] of Object.entries(albumsObj)) {
            const artistName = albumData.albumartist || artistKey;
            albumData.artistKey = artistName;
            libraryData.push(albumData);

            state.artists.add(artistName);
            state.years.add(albumData.year);
            if (albumData.genre) {
              albumData.genre.forEach((g) => state.genres.add(g));
            }
          }
        }
      }

      // --- Rendering Filters ---

      function createCheckboxList(container, items, type) {
        container.innerHTML = "";
        const sortedItems = Array.from(items).sort(
          (a, b) => a - b || a.localeCompare(b),
        );

        sortedItems.forEach((item) => {
          const label = document.createElement("label");
          label.className = "checkbox-item";

          const input = document.createElement("input");
          input.type = "checkbox";
          input.value = item;
          input.className = `filter-${type}`;

          if (state.filters[`${type}s`].has(item)) {
            input.checked = true;
          }

          input.addEventListener("change", (e) => {
            if (e.target.checked) {
              state.filters[`${type}s`].add(item);
            } else {
              state.filters[`${type}s`].delete(item);
            }
            saveFilters();
            renderAlbums();
          });

          label.appendChild(input);
          label.appendChild(document.createTextNode(item));
          container.appendChild(label);
        });
      }

      function renderFilters() {
        createCheckboxList(artistFilterEl, state.artists, "artist");
        createCheckboxList(genreFilterEl, state.genres, "genre");
        createCheckboxList(yearFilterEl, state.years, "year");

        document.querySelectorAll(".filter-format").forEach((cb) => {
          cb.checked = state.filters.formats.has(cb.value);
          cb.addEventListener("change", (e) => {
            if (e.target.checked) state.filters.formats.add(e.target.value);
            else state.filters.formats.delete(e.target.value);
            saveFilters();
            renderAlbums();
          });
        });

        // NEW: Status filter event listeners
        document.querySelectorAll(".filter-status").forEach((cb) => {
          cb.checked = state.filters.status.has(cb.value);
          cb.addEventListener("change", (e) => {
            if (e.target.checked) state.filters.status.add(e.target.value);
            else state.filters.status.delete(e.target.value);
            saveFilters();
            renderAlbums();
          });
        });
      }

      // --- Rendering Albums ---

      function formatDuration(seconds) {
        if (!seconds) return "--:--";
        const m = Math.floor(seconds / 60);
        const s = seconds % 60;
        return `${m}:${s.toString().padStart(2, "0")}`;
      }

      function toggleTracks(card, forceState = null) {
        const trackList = card.querySelector(".track-list");
        const closeBtn = card.querySelector(".tracks-close-btn");
        const isCollapsed = trackList.classList.contains("tracks-collapsed");
        const shouldExpand = forceState !== null ? forceState : isCollapsed;

        if (shouldExpand) {
          trackList.classList.remove("tracks-collapsed");
          card.classList.add("expanded");
        } else {
          trackList.classList.add("tracks-collapsed");
          card.classList.remove("expanded");
        }
      }

      function renderAlbums() {
        gridEl.innerHTML = "";

        let filtered = libraryData.filter((album) => {
          if (state.searchQuery) {
            const query = state.searchQuery.toLowerCase();
            const matchTitle = album.album.toLowerCase().includes(query);
            const matchArtist = album.albumartist.toLowerCase().includes(query);
            const matchGenre =
              album.genre &&
              album.genre.some((g) => g.toLowerCase().includes(query));
            if (!matchTitle && !matchArtist && !matchGenre) return false;
          }

          if (
            state.filters.artists.size > 0 &&
            !state.filters.artists.has(album.artistKey)
          )
            return false;
          if (
            state.filters.years.size > 0 &&
            !state.filters.years.has(album.year)
          )
            return false;

          if (state.filters.genres.size > 0) {
            const albumGenres = album.genre || [];
            const hasMatch = albumGenres.some((g) =>
              state.filters.genres.has(g),
            );
            if (!hasMatch) return false;
          }

          if (state.filters.formats.size > 0) {
            const isLossless = album.lossless === true;
            const isLossy = album.lossless === false;

            let matches = false;
            if (state.filters.formats.has("lossless") && isLossless)
              matches = true;
            if (state.filters.formats.has("lossy") && isLossy) matches = true;

            if (!matches) return false;
          }

          // NEW: Status filter logic
          if (state.filters.status.size > 0) {
            const isIncomplete = album.incomplete === true;
            const isCompleted = album.incomplete !== true;

            let matches = false;
            if (state.filters.status.has("completed") && isCompleted)
              matches = true;
            if (state.filters.status.has("incomplete") && isIncomplete)
              matches = true;

            if (!matches) return false;
          }

          return true;
        });

        filtered = sortAlbums(filtered);

        // Update Result Count
        const total = libraryData.length;
        const count = filtered.length;
        const text =
          count === total ? `${total} albums` : `${count} / ${total} albums`;
        resultCountEl.textContent = text;

        if (filtered.length === 0) {
          gridEl.innerHTML =
            '<div style="grid-column: 1/-1; text-align: center; color: var(--text-muted); padding: 2rem;">No albums found matching filters.</div>';
          return;
        }

        filtered.forEach((album) => {
          const card = document.createElement("div");
          card.className = "album-card";

          let badgesHtml = "";
          if (album.genre)
            album.genre.forEach(
              (g) =>
                (badgesHtml += `<span class="badge badge-genre">${g}</span>`),
            );
          badgesHtml += `<span class="badge badge-year">${album.year}</span>`;

          if (album.incomplete)
            badgesHtml += `<span class="badge badge-incomplete">Incomplete</span>`;
          if (album.lossless === true)
            badgesHtml += `<span class="badge badge-lossless">Lossless</span>`;
          else if (album.lossless === false)
            badgesHtml += `<span class="badge badge-lossy">Lossy</span>`;

          const metaHtml = `
                ${album.upc ? `<span>UPC: ${album.upc}</span>` : ""}
                ${album.copyright ? `<span>© ${album.copyright}</span>` : ""}
                <span>Discs: ${album.diskTotal} | Tracks: ${album.trackTotal}</span>
            `;

          let tracksHtml = "";
          if (album.tracks) {
            album.tracks.forEach((track) => {
              const bitDepth = track.bitDepth ? `${track.bitDepth}bit` : "";
              const sampleRate = track.sampleRate
                ? `${track.sampleRate / 1000}kHz`
                : "";
              const techString = [bitDepth, sampleRate]
                .filter(Boolean)
                .join(" / ");

              tracksHtml += `
                        <li class="track-item">
                            <div class="track-num">${track.disk}.${track.track.toString().padStart(2, "0")}</div>
                            <div class="track-title">${track.title}</div>
                            <div class="track-artist">${track.artist}</div>
                            <div class="track-codec"><span class="codec-tag">${track.codec || "UNK"}</span></div>
                            <div class="track-tech">${techString || "--"}</div>
                            <div class="track-duration">${formatDuration(track.duration)}</div>
                        </li>
                    `;
            });
          }

          card.innerHTML = `
                <div class="album-header">
                    <div class="album-title-row">
                        <div class="album-title">${album.album}</div>
                    </div>
                    <div class="album-artist">${album.albumartist}</div>
                    <div class="badges">${badgesHtml}</div>
                    <div class="meta-details">${metaHtml}</div>
                </div>
                <ul class="track-list tracks-collapsed">
                    ${tracksHtml}
                </ul>
                <button class="tracks-close-btn">Hide Tracks</button>
            `;

          const header = card.querySelector(".album-header");
          header.addEventListener("click", (e) => {
            e.stopPropagation();
            toggleTracks(card);
          });

          const closeBtn = card.querySelector(".tracks-close-btn");
          closeBtn.addEventListener("click", (e) => {
            e.stopPropagation();
            toggleTracks(card, false);
          });

          gridEl.appendChild(card);
        });
      }

      // --- Event Listeners ---

      // UPDATED: Sort dropdown event listeners (replaced radio buttons)
      sortFieldSelect?.addEventListener("change", (e) => {
        state.sort.field = e.target.value;
        saveSort();
        renderAlbums();
      });

      sortDirSelect?.addEventListener("change", (e) => {
        state.sort.direction = e.target.value;
        saveSort();
        renderAlbums();
      });

      // Search Input
      searchInput.addEventListener("input", (e) => {
        state.searchQuery = e.target.value.trim();
        renderAlbums();
      });

      // Keyboard Shortcuts
      document.addEventListener("keydown", (e) => {
        // Focus search on '/' if not already typing in an input
        if (e.key === "/" && document.activeElement !== searchInput) {
          e.preventDefault();
          searchInput.focus();
        }
        // Close search on 'Esc'
        if (e.key === "Escape" && document.activeElement === searchInput) {
          searchInput.blur();
          searchInput.value = "";
          state.searchQuery = "";
          renderAlbums();
        }
      });

      // Clear Filters
      clearFiltersBtn.addEventListener("click", clearAllFilters);

      // Theme Toggle
      themeBtn.addEventListener("click", () => {
        const body = document.body;
        const isDark = body.getAttribute("data-theme") !== "light";

        if (isDark) {
          body.setAttribute("data-theme", "light");
          themeBtn.textContent = "Dark Mode";
          saveTheme(true);
        } else {
          body.removeAttribute("data-theme");
          themeBtn.textContent = "Light Mode";
          saveTheme(false);
        }
      });

      // Modal Logic
      infoBtn.addEventListener("click", () => {
        renderStats();
        infoModal.classList.add("active");
      });

      modalClose.addEventListener("click", () => {
        infoModal.classList.remove("active");
      });

      infoModal.addEventListener("click", (e) => {
        if (e.target === infoModal) {
          infoModal.classList.remove("active");
        }
      });

      // Run
      init();
    </script>
  </body>
</html>
